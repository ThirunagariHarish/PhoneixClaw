apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-api
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-api
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      {{- include "phoenix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: phoenix-api
  template:
    metadata:
      labels:
        {{- include "phoenix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: phoenix-api
    spec:
      containers:
      - name: api
        image: {{ .Values.image.repository }}/phoenix-api:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8011
          name: http
        envFrom:
        - configMapRef:
            name: phoenix-config
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: "postgresql+asyncpg://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.database }}"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: JWT_SECRET_KEY
        - name: CREDENTIAL_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: CREDENTIAL_ENCRYPTION_KEY
        - name: FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: CREDENTIAL_ENCRYPTION_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: ANTHROPIC_API_KEY
        - name: ADMIN_BOOTSTRAP_EMAIL
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: ADMIN_BOOTSTRAP_EMAIL
              optional: true
        - name: ADMIN_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: ADMIN_BOOTSTRAP_PASSWORD
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8011
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8011
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          limits:
            memory: {{ .Values.resources.api.memory }}
