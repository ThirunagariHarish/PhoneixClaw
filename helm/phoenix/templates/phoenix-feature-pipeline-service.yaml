apiVersion: v1
kind: Service
metadata:
  name: phoenix-feature-pipeline
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-feature-pipeline
spec:
  type: ClusterIP
  ports:
  - port: 8055
    targetPort: 8055
    protocol: TCP
    name: http
  selector:
    {{- include "phoenix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-feature-pipeline
