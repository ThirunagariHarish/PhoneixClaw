apiVersion: v1
kind: Service
metadata:
  name: phoenix-execution
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-execution
spec:
  type: ClusterIP
  ports:
  - port: 8020
    targetPort: 8020
    protocol: TCP
    name: http
  selector:
    {{- include "phoenix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-execution
