apiVersion: v1
kind: Service
metadata:
  name: phoenix-backtest-worker
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-backtest-worker
spec:
  # Headless service for discovery/metrics hygiene (no actual HTTP server)
  clusterIP: None
  selector:
    {{- include "phoenix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-backtest-worker
  ports:
  - port: 8090
    targetPort: 8090
    name: metrics
