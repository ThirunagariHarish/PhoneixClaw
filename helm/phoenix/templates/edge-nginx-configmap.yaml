apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-nginx-config
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        map $http_upgrade $connection_upgrade {
            default upgrade;
            '' close;
        }

        server {
            listen 80;
            server_name _;

            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

            location /api/ {
                proxy_pass http://phoenix-api.phoenix.svc.cluster.local:8011;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 1900s;
                proxy_send_timeout 1900s;
            }

            location /auth/ {
                proxy_pass http://phoenix-api.phoenix.svc.cluster.local:8011;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_read_timeout 60s;
            }

            location /health {
                proxy_pass http://phoenix-api.phoenix.svc.cluster.local:8011;
            }

            location ~ ^/(docs|redoc|openapi\.json) {
                allow 127.0.0.1;
                allow 10.0.0.0/8;
                allow 172.16.0.0/12;
                allow 192.168.0.0/16;
                deny all;
                proxy_pass http://phoenix-api.phoenix.svc.cluster.local:8011;
            }

            location /ws/ {
                proxy_pass http://phoenix-ws-gateway.phoenix.svc.cluster.local:8031;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_read_timeout 86400;
            }

            location /assets/ {
                proxy_pass http://phoenix-dashboard.phoenix.svc.cluster.local:80;
                proxy_set_header Host $host;
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            location / {
                proxy_pass http://phoenix-dashboard.phoenix.svc.cluster.local:80;
                proxy_set_header Host $host;
            }
        }
    }
