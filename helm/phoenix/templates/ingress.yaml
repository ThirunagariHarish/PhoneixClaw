apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phoenix
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
  - host: cashflowus.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: edge-nginx
            port:
              number: 80
  - host: www.cashflowus.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: edge-nginx
            port:
              number: 80
  tls:
  - hosts:
    - cashflowus.com
    - www.cashflowus.com
    secretName: phoenix-tls
