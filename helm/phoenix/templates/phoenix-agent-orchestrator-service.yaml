  name: phoenix-agent-orchestrator
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-agent-orchestrator
spec:
  type: ClusterIP
  ports:
  - port: 8070
    targetPort: 8070
    protocol: TCP
    name: http
  selector:
    {{- include "phoenix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-agent-orchestrator
