apiVersion: v1
kind: Service
metadata:
  name: phoenix-api
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-api
spec:
  type: ClusterIP
  ports:
  - port: 8011
    targetPort: 8011
    protocol: TCP
    name: http
  selector:
    {{- include "phoenix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-api
