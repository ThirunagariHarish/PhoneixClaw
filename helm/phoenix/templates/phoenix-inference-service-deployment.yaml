apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-inference-service
  labels:
    {{- include "phoenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix-inference-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "phoenix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: phoenix-inference-service
  template:
    metadata:
      labels:
        {{- include "phoenix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: phoenix-inference-service
    spec:
      containers:
      - name: inference-service
        image: {{ .Values.image.repository }}/phoenix-inference-service:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8045
          name: http
        envFrom:
        - configMapRef:
            name: phoenix-config
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: "postgresql+asyncpg://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.database }}"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: MINIO_ROOT_USER
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: MINIO_ROOT_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 8045
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8045
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          limits:
            memory: {{ .Values.resources.inferenceService.memory }}
