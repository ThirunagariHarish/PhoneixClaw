## sum_to_one_arb — Polymarket binary YES+NO < 1 arbitrage agent
## Reference: docs/architecture/polymarket-tab.md section 9, Phase 8 (F3.1).
##
## v1.0 ships PAPER-only per user policy. The orchestrator loader reads this
## file to register the agent. Promotion to LIVE goes through the Phase 11
## promotion gate engine; do not flip `mode: LIVE` here.

name: sum_to_one_arb
archetype: sum_to_one_arb
venue: polymarket
enabled: true
mode: PAPER

# Risk caps mirror PolymarketLayerRisk defaults. The risk chain is the
# source of truth at runtime; values here are advisory and used by the
# loader when seeding `pm_strategies` for a brand-new install.
risk:
  bankroll_usd: 5000.0
  max_strategy_notional_usd: 1000.0
  max_trade_notional_usd: 100.0
  kelly_cap: 0.25
  min_edge_bps: 50           # require at least 50 bps of edge after fees
  fee_rate: 0.02             # mirrors shared.polymarket.paper_fill.DEFAULT_FEE_RATE

# How often the scanner cycle runs and how many opportunities it will
# attempt to fire per cycle. Both are soft limits; the kill switch and
# `paused` flag override.
cycle:
  scan_interval_seconds: 5
  max_opportunities_per_cycle: 5
  kill_switch_check_interval_seconds: 1

# Tools the orchestrator should expose to this agent. Phase 8 only
# needs the broker submit + the risk chain; the orchestrator wires the
# concrete adapters at startup.
tools:
  - polymarket_broker.submit_order
  - polymarket_broker.cancel_order
  - risk_chain.evaluate
  - pm_orders.insert
