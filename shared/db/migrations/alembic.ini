# Phoenix v2 shared/db migrations.
# Run from repo root: alembic -c shared/db/migrations/alembic.ini upgrade head

[alembic]
# Run from repo root: PYTHONPATH=. alembic -c shared/db/migrations/alembic.ini upgrade head
script_location = shared/db/migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://phoenixtrader:localdev@localhost:5432/phoenixtrader

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
