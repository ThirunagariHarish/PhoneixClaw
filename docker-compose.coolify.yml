###############################################################################
# Phoenix Claw v2 — Coolify Production Compose
#
# Deploy via Coolify's Docker Compose build pack.
# All ${VAR} references are auto-detected and exposed in Coolify's UI.
# Set them in Coolify's Environment Variables panel before deploying.
#
# Coolify will route traffic to the nginx service (port 80) via Traefik.
###############################################################################

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phoenixtrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-phoenixtrader}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phoenixtrader}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ─── Database Migrations ─────────────────────────────────────────────────
  phoenix-db-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    entrypoint: ["python", "scripts/docker_migrate.py"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Ollama (AI/LLM) — DISABLED in production to stay within 8GB VPS RAM ──
  # Ollama consumes 4 GB alone; with the rest of the stack this exceeds 8 GB.
  # Re-enable when running on a 16 GB+ host or add: profiles: [ollama]
  # ollama:
  #   image: ollama/ollama:latest
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 4G
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #   restart: unless-stopped

  # phoenix-ollama-init:
  #   image: curlimages/curl:latest
  #   depends_on:
  #     ollama:
  #       condition: service_started
  #   entrypoint: >
  #     sh -c "sleep 30 && curl -sf http://ollama:11434/api/pull -d '{"name":"llama3.2:1b","stream":false}' || true"
  #   restart: "no"

  # ─── Core Application ──────────────────────────────────────────────────
  phoenix-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-${CREDENTIAL_ENCRYPTION_KEY:-}}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_EXPAND_MODEL=${OLLAMA_EXPAND_MODEL:-llama3.2:1b}
      - LLM_GATEWAY_URL=http://phoenix-llm-gateway:8050
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Phoenix internal API URL — used by Claude Code subprocesses for backtest progress callbacks.
      # Must be the internal service name so Docker-spawned Claude agents can reach the API.
      - PHOENIX_API_URL=http://phoenix-api:8011
      # CORS — set CORS_ORIGINS to your production frontend domain in .env
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # Trading safety guards — keep DRY_RUN_MODE=true until broker integration verified
      - DRY_RUN_MODE=${DRY_RUN_MODE:-true}
      - ENABLE_TRADING=${ENABLE_TRADING:-false}
      # WEB_CONCURRENCY=1: agent gateway uses in-memory dicts (_running_tasks, _session_ids)
      # that are broken under multiple workers. Use 1 worker until these are moved to Redis.
      - WEB_CONCURRENCY=1
      # NODE_OPTIONS is set in entrypoint.sh as defense-in-depth (V8 heap cap).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      phoenix-db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 2G  # claude_agent_sdk spawns Node `claude` CLI in same cgroup; 512M caused OOM SIGKILL
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    depends_on:
      - phoenix-api
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  # ─── Nginx (Public Entrypoint — Coolify routes via Traefik) ────────────
  nginx:
    build:
      context: .
      dockerfile: infra/Dockerfile.nginx
    expose:
      - "80"
    depends_on:
      phoenix-api:
        condition: service_started
      phoenix-dashboard:
        condition: service_started
    restart: unless-stopped

  # ─── WebSocket Gateway ──────────────────────────────────────────────────
  phoenix-ws-gateway:
    build:
      context: .
      dockerfile: services/ws-gateway/Dockerfile
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  phoenix-llm-gateway:
    build:
      context: .
      dockerfile: services/llm-gateway/Dockerfile
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_EXPAND_MODEL:-llama3.2:1b}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ─── Background Services ───────────────────────────────────────────────
  phoenix-execution:
    build:
      context: .
      dockerfile: services/execution/Dockerfile
    environment:
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  phoenix-automation:
    build:
      context: .
      dockerfile: services/automation/Dockerfile
    environment:
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - API_URL=http://phoenix-api:8011
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  phoenix-discord-ingestion:
    build:
      context: .
      dockerfile: services/discord-ingestion/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-${CREDENTIAL_ENCRYPTION_KEY:-}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-feature-pipeline:
    build:
      context: .
      dockerfile: services/feature-pipeline/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8055/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-inference-service:
    build:
      context: .
      dockerfile: services/inference-service/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MODEL_BUCKET=${MODEL_BUCKET:-phoenix-models}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8045/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-broker-gateway:
    build:
      context: .
      dockerfile: services/broker-gateway/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-${CREDENTIAL_ENCRYPTION_KEY:-}}
      - DRY_RUN_MODE=${DRY_RUN_MODE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-agent-orchestrator:
    build:
      context: .
      dockerfile: services/agent-orchestrator/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PHOENIX_API_URL=http://phoenix-api:8011
      - BROKER_GATEWAY_URL=http://phoenix-broker-gateway:8040
      - INFERENCE_SERVICE_URL=http://phoenix-inference-service:8045
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-${CREDENTIAL_ENCRYPTION_KEY:-}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-prediction-monitor:
    build:
      context: .
      dockerfile: services/prediction-monitor/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8075/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-backtesting:
    build:
      context: .
      dockerfile: services/backtesting/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - PHOENIX_API_URL=http://phoenix-api:8011
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  miniodata:
  # ollama_data:  # re-enable when Ollama service is re-enabled
