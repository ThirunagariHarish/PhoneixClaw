global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'phoenix-api'
    static_configs:
      - targets: ['phoenix-api:8011']
    metrics_path: /metrics

  - job_name: 'phoenix-bridge'
    static_configs:
      - targets: ['phoenix-bridge:18800']
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'phoenix-execution'
    static_configs:
      - targets: ['phoenix-execution:8020']
    metrics_path: /metrics

  - job_name: 'phoenix-agent-orchestrator'
    static_configs:
      - targets: ['phoenix-agent-orchestrator:8070']
    metrics_path: /metrics

  - job_name: 'phoenix-ws-gateway'
    static_configs:
      - targets: ['phoenix-ws-gateway:8031']
    metrics_path: /metrics

  - job_name: 'phoenix-discord-ingestion'
    static_configs:
      - targets: ['phoenix-discord-ingestion:8060']
    metrics_path: /metrics

  - job_name: 'phoenix-feature-pipeline'
    static_configs:
      - targets: ['phoenix-feature-pipeline:8055']
    metrics_path: /metrics

  - job_name: 'phoenix-inference-service'
    static_configs:
      - targets: ['phoenix-inference-service:8045']
    metrics_path: /metrics

  - job_name: 'phoenix-broker-gateway'
    static_configs:
      - targets: ['phoenix-broker-gateway:8040']
    metrics_path: /metrics

  - job_name: 'phoenix-prediction-monitor'
    static_configs:
      - targets: ['phoenix-prediction-monitor:8075']
    metrics_path: /metrics

  - job_name: 'phoenix-backtesting'
    static_configs:
      - targets: ['phoenix-backtesting:8085']
    metrics_path: /metrics
