events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/ {
            set $backend_api phoenix-api:8011;
            proxy_pass http://$backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Backtesting runs up to 30 minutes — default 60s would abort them
            proxy_read_timeout 1900s;
            proxy_send_timeout 1900s;
        }

        location /auth/ {
            set $backend_api phoenix-api:8011;
            proxy_pass http://$backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /health {
            set $backend_api phoenix-api:8011;
            proxy_pass http://$backend_api;
        }

        # Restrict API docs to internal/loopback access only
        location ~ ^/(docs|redoc|openapi\.json) {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            set $backend_api phoenix-api:8011;
            proxy_pass http://$backend_api;
        }

        location /ws/ {
            set $backend_ws phoenix-ws-gateway:8031;
            proxy_pass http://$backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location /assets/ {
            set $backend_dash phoenix-dashboard:80;
            proxy_pass http://$backend_dash;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            set $backend_dash phoenix-dashboard:80;
            proxy_pass http://$backend_dash;
            proxy_set_header Host $host;
        }
    }
}
