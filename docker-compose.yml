version: "3.9"

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: phoenixtrader
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: phoenixtrader
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U phoenixtrader
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8001:8001"
    environment: &common-env
      DATABASE_URL: postgresql+asyncpg://phoenixtrader:localdev@postgres:5432/phoenixtrader
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: dev-secret-key
      CREDENTIAL_ENCRYPTION_KEY: ZGV2LWVuY3J5cHRpb24ta2V5LTEyMzQ1Njc4OTA=
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8011:8011"
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  trade-parser:
    build:
      context: .
      dockerfile: services/trade-parser/Dockerfile
    environment:
      <<: *common-env
      NLP_PARSER_URL: http://nlp-parser:8020
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  trade-gateway:
    build:
      context: .
      dockerfile: services/trade-gateway/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  trade-executor:
    build:
      context: .
      dockerfile: services/trade-executor/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  position-monitor:
    build:
      context: .
      dockerfile: services/position-monitor/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  source-orchestrator:
    build:
      context: .
      dockerfile: services/source-orchestrator/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  audit-writer:
    build:
      context: .
      dockerfile: services/audit-writer/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  nlp-parser:
    build:
      context: services/nlp-parser
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          memory: 1536M

  sentiment-analyzer:
    build:
      context: .
      dockerfile: services/sentiment-analyzer/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  news-aggregator:
    build:
      context: .
      dockerfile: services/news-aggregator/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  option-chain-analyzer:
    build:
      context: .
      dockerfile: services/option-chain-analyzer/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ai-trade-recommender:
    build:
      context: .
      dockerfile: services/ai-trade-recommender/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  strategy-agent:
    build:
      context: .
      dockerfile: services/strategy-agent/Dockerfile
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  dashboard-ui:
    build:
      context: services/dashboard-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
