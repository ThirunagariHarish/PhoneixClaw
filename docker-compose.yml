services:
  phoenix-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8011:8011"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - API_DEBUG=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EXPAND_MODEL=${OLLAMA_EXPAND_MODEL:-llama3.2:1b}
      - LLM_GATEWAY_URL=http://phoenix-llm-gateway:8050
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  phoenix-ws-gateway:
    build:
      context: .
      dockerfile: services/ws-gateway/Dockerfile
    ports:
      - "8031:8031"
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  phoenix-execution:
    build:
      context: .
      dockerfile: services/execution/Dockerfile
    environment:
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  phoenix-automation:
    build:
      context: .
      dockerfile: services/automation/Dockerfile
    environment:
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - API_URL=http://phoenix-api:8011
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  phoenix-discord-ingestion:
    build:
      context: .
      dockerfile: services/discord-ingestion/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-${CREDENTIAL_ENCRYPTION_KEY:-}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-feature-pipeline:
    build:
      context: .
      dockerfile: services/feature-pipeline/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8055/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-inference-service:
    build:
      context: .
      dockerfile: services/inference-service/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MODEL_BUCKET=${MODEL_BUCKET:-phoenix-models}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8045/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-broker-gateway:
    build:
      context: .
      dockerfile: services/broker-gateway/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-${CREDENTIAL_ENCRYPTION_KEY:-}}
      - DRY_RUN_MODE=${DRY_RUN_MODE:-true}
      - RH_USERNAME=${RH_USERNAME:-}
      - RH_PASSWORD=${RH_PASSWORD:-}
      - RH_TOTP_SECRET=${RH_TOTP_SECRET:-}
      - TOKEN_DIR=${TOKEN_DIR:-/app/data/.tokens}
    volumes:
      - rh_tokens:${TOKEN_DIR:-/app/data/.tokens}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8040/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-agent-orchestrator:
    build:
      context: .
      dockerfile: services/agent-orchestrator/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PHOENIX_API_URL=http://phoenix-api:8011
      - BROKER_GATEWAY_URL=http://phoenix-broker-gateway:8040
      - INFERENCE_SERVICE_URL=http://phoenix-inference-service:8045
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-${CREDENTIAL_ENCRYPTION_KEY:-}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-prediction-monitor:
    build:
      context: .
      dockerfile: services/prediction-monitor/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8075/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  phoenix-backtesting:
    build:
      context: .
      dockerfile: services/backtesting/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - PHOENIX_API_URL=http://phoenix-api:8011
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phoenixtrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-phoenixtrader}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phoenixtrader}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: infra/Dockerfile.nginx
    ports:
      - "8080:80"
    depends_on:
      - phoenix-api
      - phoenix-dashboard
      - phoenix-ws-gateway
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/observability/grafana:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - lokidata:/loki
    command: -config.file=/etc/loki/local-config.yaml -table-manager.retention-deletes-enabled=true -table-manager.retention-period=720h
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/observability/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-phoenixtrader}:${POSTGRES_PASSWORD:-localdev}@postgres:5432/${POSTGRES_DB:-phoenixtrader}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  phoenix-ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "curl -sf http://ollama:11434/api/pull -d '{\"name\":\"llama3.2:1b\",\"stream\":false}' || true"
    restart: "no"

  phoenix-llm-gateway:
    build:
      context: .
      dockerfile: services/llm-gateway/Dockerfile
    ports:
      - "8050:8050"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_EXPAND_MODEL:-llama3.2:1b}
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prediction Markets — TopBetsAgent (Phase 15.8) ─────────────────────────
  # Included in the "agents" profile so it does NOT start with plain
  # `docker compose up`.  Start explicitly with:
  #   docker compose --profile agents up pm-top-bets-agent
  pm-top-bets-agent:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: python -m agents.polymarket.top_bets.runner
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PM_TOP_BETS_VENUE=${PM_TOP_BETS_VENUE:-robinhood_predictions}
      - PM_TOP_BETS_ENABLED=${PM_TOP_BETS_ENABLED:-true}
      - PM_TOP_BETS_CYCLE_INTERVAL_S=${PM_TOP_BETS_CYCLE_INTERVAL_S:-60}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    profiles:
      - agents

volumes:
  pgdata:
  rh_tokens:
  miniodata:
  promdata:
  grafanadata:
  lokidata:
  ollama_data:
