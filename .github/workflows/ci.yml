# Phoenix v2 CI — Lint, test, build.
# M1.1: Includes apps/api and apps/dashboard. Reference: ImplementationPlan.md Section 5.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check shared/ services/ apps/ tests/

  test-api:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run legacy unit tests
        run: python -m pytest tests/unit/ -v --tb=short
      - name: Run Phoenix v2 API tests
        run: PYTHONPATH=. python -m pytest apps/api/tests/ -v --tb=short

  test-dashboard:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dashboard deps
        run: cd apps/dashboard && npm install
      - name: Run dashboard tests
        run: cd apps/dashboard && npm run test

  build:
    runs-on: ubuntu-latest
    needs: [test-api, test-dashboard]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - api-gateway
          - trade-parser
          - trade-gateway
          - trade-executor
          - position-monitor
          - notification-service
          - source-orchestrator
          - audit-writer
          - dashboard-ui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'dashboard-ui' && 'services/dashboard-ui' || '.' }}
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: phoenixtrader/${{ matrix.service }}:${{ github.sha }}

  build-v2-api:
    runs-on: ubuntu-latest
    needs: [test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Phoenix v2 API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: phoenixtrader/api-v2:${{ github.sha }}
