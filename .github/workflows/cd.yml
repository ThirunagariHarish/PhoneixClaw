name: CD

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint (ruff)
        continue-on-error: true   # 343 pre-existing violations; flip to fail after triage.
        run: |
          pip install -q ruff
          ruff check shared/ services/ apps/api/src/ || { echo "::warning::ruff lint failed — fix locally with 'make lint-fix'"; exit 1; }
      - name: Trivy filesystem scan (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          scanners: vuln
          format: table
        continue-on-error: true   # SHOULD FAIL once we triage existing CVEs; warn-only for now

  resolve-tag:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="main-$(echo "$GITHUB_SHA" | cut -c1-7)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: $TAG"

  build:
    runs-on: ubuntu-latest
    needs: resolve-tag
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      max-parallel: 6
      matrix:
        include:
          - { name: phoenix-api,                 dockerfile: apps/api/Dockerfile }
          - { name: phoenix-dashboard,           dockerfile: apps/dashboard/Dockerfile }
          - { name: phoenix-ws-gateway,          dockerfile: services/ws-gateway/Dockerfile }
          - { name: phoenix-llm-gateway,         dockerfile: services/llm-gateway/Dockerfile }
          - { name: phoenix-broker-gateway,      dockerfile: services/broker-gateway/Dockerfile }
          - { name: phoenix-execution,           dockerfile: services/execution/Dockerfile }
          - { name: phoenix-automation,          dockerfile: services/automation/Dockerfile }
          - { name: phoenix-discord-ingestion,   dockerfile: services/discord-ingestion/Dockerfile }
          - { name: phoenix-feature-pipeline,    dockerfile: services/feature-pipeline/Dockerfile }
          - { name: phoenix-inference-service,   dockerfile: services/inference-service/Dockerfile }
          - { name: phoenix-agent-orchestrator,  dockerfile: services/agent-orchestrator/Dockerfile }
          - { name: phoenix-prediction-monitor,  dockerfile: services/prediction-monitor/Dockerfile }
          - { name: phoenix-backtesting,         dockerfile: services/backtesting/Dockerfile }
          - { name: phoenix-pipeline-worker,     dockerfile: services/pipeline-worker/Dockerfile }
          - { name: phoenix-nginx,               dockerfile: infra/Dockerfile.nginx }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/thirunagariharish/phoneixclaw/${{ matrix.name }}:${{ needs.resolve-tag.outputs.tag }}
            ghcr.io/thirunagariharish/phoneixclaw/${{ matrix.name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/ThirunagariHarish/PhoneixClaw
          # GHA cache scoped per-service so one image's layers don't evict another's.
          # mode=max stores intermediate stages so subsequent builds on the same service
          # reuse pip / apt layers when only Python source changes.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build]
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Stage SSH key
        env:
          K3S_HOST: ${{ secrets.K3S_HOST }}
          K3S_SSH_KEY: ${{ secrets.K3S_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${K3S_HOST:-}" ] || [ -z "${K3S_SSH_KEY:-}" ]; then
            echo "ERROR: K3S_HOST and K3S_SSH_KEY secrets are required for k3s deployment"
            exit 1
          fi
          mkdir -p ~/.ssh
          if echo "$K3S_SSH_KEY" | head -1 | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf '%s\n' "$K3S_SSH_KEY" > ~/.ssh/deploy_key
          else
            echo "$K3S_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null || { echo "K3S_SSH_KEY did not parse — re-paste it (raw 7-line key OR base64-encoded)"; exit 1; }

          # Reusable SSH options. ServerAliveInterval keeps the client→server
          # control channel alive during long `helm upgrade --wait` runs, which
          # previously dropped with "client_loop: send disconnect: Broken pipe"
          # after ~5 min even though helm completed on the VPS.
          cat > ~/.ssh/config <<'EOF'
          Host k3s
            HostName placeholder
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 30
            ServerAliveCountMax 60
            TCPKeepAlive yes
          EOF
          sed -i "s/placeholder/$K3S_HOST/" ~/.ssh/config

      - name: Pre-upgrade Postgres backup
        id: backup
        continue-on-error: true
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          REMOTE_DUMP="/tmp/phoenix-${STAMP}-${TAG}.dump"
          LOCAL_DUMP="$GITHUB_WORKSPACE/postgres-pre-${TAG}.dump"

          POD_STATE=$(ssh k3s "kubectl get pod postgres-0 -n phoenix -o jsonpath='{.status.phase}' 2>/dev/null" || echo "NotFound")

          if [ "$POD_STATE" = "NotFound" ] || [ -z "$POD_STATE" ]; then
            echo "postgres-0 not present — first install on this cluster. Skipping backup."
            echo "BACKED_UP=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$POD_STATE" != "Running" ]; then
            echo "::error::postgres-0 is in state '$POD_STATE' (not Running). Refusing to deploy without a backup."
            exit 1
          fi

          echo "Dumping postgres-0 → $REMOTE_DUMP"
          ssh k3s "kubectl exec -n phoenix postgres-0 -- pg_dump -U phoenixtrader -d phoenixtrader --format=custom --compress=9 > $REMOTE_DUMP && ls -lh $REMOTE_DUMP"

          echo "Copying dump back to runner..."
          scp -F ~/.ssh/config k3s:"$REMOTE_DUMP" "$LOCAL_DUMP"
          ls -lh "$LOCAL_DUMP"
          ssh k3s "rm -f $REMOTE_DUMP"
          echo "BACKED_UP=true" >> "$GITHUB_OUTPUT"

      - name: Upload Postgres backup as artifact
        if: steps.backup.outputs.BACKED_UP == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: postgres-pre-${{ needs.resolve-tag.outputs.tag }}
          path: ${{ github.workspace }}/postgres-pre-*.dump
          retention-days: 90
          if-no-files-found: error

      - name: Fail if backup step errored AND postgres exists
        if: steps.backup.outcome == 'failure'
        run: |
          echo "::error::Pre-upgrade Postgres backup failed. Refusing to deploy without a recoverable dump."
          exit 1

      - name: Deploy to k3s
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve-tag.outputs.tag }}"

          # Hostinger sshd intermittently rejects the initial TCP connection
          # ("banner exchange timeout" / "Connection timed out"). Retry the
          # short connect-style commands with exponential-ish backoff before
          # giving up. The long-running `helm upgrade --wait` doesn't get the
          # retry (a half-applied helm release is worse than a clean fail).
          retry_ssh () {
            local attempt
            for attempt in 1 2 3 4 5; do
              if ssh -o ConnectTimeout=15 k3s "$@"; then
                return 0
              fi
              echo "SSH attempt $attempt failed; sleeping $((attempt * 10))s..."
              sleep $((attempt * 10))
            done
            echo "::error::SSH retries exhausted for: $*"
            return 1
          }
          retry_scp () {
            local attempt
            for attempt in 1 2 3 4 5; do
              if scp -o ConnectTimeout=15 -F ~/.ssh/config "$@"; then
                return 0
              fi
              echo "SCP attempt $attempt failed; sleeping $((attempt * 10))s..."
              sleep $((attempt * 10))
            done
            echo "::error::SCP retries exhausted for: $*"
            return 1
          }

          echo "Copying Helm chart to k3s host..."
          retry_ssh "mkdir -p /opt/phoenix"
          retry_scp -r helm/phoenix k3s:/opt/phoenix/

          echo "Deploying Phoenix to k3s (tag: $TAG)..."
          ssh k3s \
            "helm upgrade --install phoenix /opt/phoenix/helm/phoenix \
              -f /opt/phoenix/helm/phoenix/values.prod.yaml \
              -n phoenix --create-namespace \
              --set image.tag=$TAG \
              --wait --timeout=15m"

      - name: Smoke test public health
        if: success()
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            if curl -fsS https://cashflowus.com/health | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('status')=='ready' else 1)"; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Health check failed (attempt $i/6), retrying in 10s..."
            sleep 10
          done
          echo "::error::Public health check failed after 6 attempts. Investigate at https://cashflowus.com/health"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key ~/.ssh/config
          echo "Deployment complete (tag: ${{ needs.resolve-tag.outputs.tag }})"
