name: CD

on:
  push:
    tags:
      - "v*"
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all v2 services
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SERVICES=(
            "phoenix-api:apps/api/Dockerfile"
            "phoenix-dashboard:apps/dashboard/Dockerfile"
            "phoenix-ws-gateway:services/ws-gateway/Dockerfile"
            "phoenix-execution:services/execution/Dockerfile"
            "phoenix-automation:services/automation/Dockerfile"
            "phoenix-global-monitor:services/global-monitor/Dockerfile"
            "phoenix-connector-manager:services/connector-manager/Dockerfile"
            "phoenix-backtest-runner:services/backtest-runner/Dockerfile"
            "phoenix-agent-comm:services/agent-comm/Dockerfile"
          )
          for entry in "${SERVICES[@]}"; do
            IFS=":" read -r svc dockerfile <<< "$entry"
            if [ -f "$dockerfile" ]; then
              echo "Building $svc ($TAG)..."
              docker build -t ghcr.io/${{ github.repository }}/$svc:$TAG -t ghcr.io/${{ github.repository }}/$svc:latest -f $dockerfile . || echo "WARN: $svc build failed, skipping"
              docker push ghcr.io/${{ github.repository }}/$svc:$TAG || true
              docker push ghcr.io/${{ github.repository }}/$svc:latest || true
            else
              echo "SKIP: $dockerfile not found"
            fi
          done

      - name: Deploy to Coolify via webhook
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -n "$COOLIFY_WEBHOOK_URL" ]; then
            echo "Triggering Coolify deployment..."
            curl -fsSL -X POST "$COOLIFY_WEBHOOK_URL" \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Content-Type: application/json" \
              --max-time 30 || echo "Webhook failed — falling back to SSH deploy"
          fi

      - name: Deploy via SSH (fallback)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COOLIFY_SSH_KEY: ${{ secrets.COOLIFY_SSH_KEY }}
          COOLIFY_HOST: ${{ secrets.COOLIFY_HOST }}
        run: |
          if [ -n "$COOLIFY_SSH_KEY" ] && [ -n "$COOLIFY_HOST" ]; then
            echo "Deploying via SSH..."
            mkdir -p ~/.ssh
            echo "$COOLIFY_SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@$COOLIFY_HOST" \
              "cd /data/coolify/applications/tsogksw8kg0kgkgoow048cgk && docker compose pull && docker compose up -d --remove-orphans"
            rm -f ~/.ssh/deploy_key
          else
            echo "No SSH credentials configured — skipping SSH deploy"
          fi
