name: CD

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint (ruff)
        run: |
          pip install -q ruff
          ruff check shared/ services/ apps/api/src/ || { echo "::error::ruff lint failed — fix locally with 'make lint-fix'"; exit 1; }
      - name: Trivy filesystem scan (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          scanners: vuln
          format: table
        continue-on-error: true   # SHOULD FAIL once we triage existing CVEs; warn-only for now

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="main-$(echo "$GITHUB_SHA" | cut -c1-7)"
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: $TAG"

      - name: Build and push all Phoenix services
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.TAG }}"
          IMAGE_REPO="ghcr.io/thirunagariharish/phoneixclaw"
          SOURCE_LABEL="org.opencontainers.image.source=https://github.com/ThirunagariHarish/PhoneixClaw"

          SERVICES=(
            "phoenix-api:apps/api/Dockerfile"
            "phoenix-dashboard:apps/dashboard/Dockerfile"
            "phoenix-ws-gateway:services/ws-gateway/Dockerfile"
            "phoenix-llm-gateway:services/llm-gateway/Dockerfile"
            "phoenix-broker-gateway:services/broker-gateway/Dockerfile"
            "phoenix-execution:services/execution/Dockerfile"
            "phoenix-automation:services/automation/Dockerfile"
            "phoenix-discord-ingestion:services/discord-ingestion/Dockerfile"
            "phoenix-feature-pipeline:services/feature-pipeline/Dockerfile"
            "phoenix-inference-service:services/inference-service/Dockerfile"
            "phoenix-agent-orchestrator:services/agent-orchestrator/Dockerfile"
            "phoenix-prediction-monitor:services/prediction-monitor/Dockerfile"
            "phoenix-backtesting:services/backtesting/Dockerfile"
            "phoenix-pipeline-worker:services/pipeline-worker/Dockerfile"
            "phoenix-nginx:infra/Dockerfile.nginx"
          )

          for entry in "${SERVICES[@]}"; do
            IFS=":" read -r svc dockerfile <<< "$entry"
            if [ -f "$dockerfile" ]; then
              echo "Building $svc ($TAG)..."
              docker build \
                --label "$SOURCE_LABEL" \
                -t "$IMAGE_REPO/$svc:$TAG" \
                -t "$IMAGE_REPO/$svc:latest" \
                -f "$dockerfile" .
              docker push "$IMAGE_REPO/$svc:$TAG"
              docker push "$IMAGE_REPO/$svc:latest"
            else
              echo "SKIP: $dockerfile not found"
            fi
          done

      - name: Stage SSH key
        env:
          K3S_HOST: ${{ secrets.K3S_HOST }}
          K3S_SSH_KEY: ${{ secrets.K3S_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${K3S_HOST:-}" ] || [ -z "${K3S_SSH_KEY:-}" ]; then
            echo "ERROR: K3S_HOST and K3S_SSH_KEY secrets are required for k3s deployment"
            exit 1
          fi
          mkdir -p ~/.ssh
          if echo "$K3S_SSH_KEY" | head -1 | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf '%s\n' "$K3S_SSH_KEY" > ~/.ssh/deploy_key
          else
            echo "$K3S_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null || { echo "K3S_SSH_KEY did not parse — re-paste it (raw 7-line key OR base64-encoded). See https://github.com/ThirunagariHarish/PhoneixClaw/settings/secrets/actions"; exit 1; }

      - name: Pre-upgrade Postgres backup
        id: backup
        continue-on-error: true
        env:
          K3S_HOST: ${{ secrets.K3S_HOST }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.TAG }}"
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          REMOTE_DUMP="/tmp/phoenix-${STAMP}-${TAG}.dump"
          # Use $GITHUB_WORKSPACE (NOT /tmp) so actions/upload-artifact can find it.
          LOCAL_DUMP="$GITHUB_WORKSPACE/postgres-pre-${TAG}.dump"
          mkdir -p "$GITHUB_WORKSPACE/_backup"

          # Detect postgres state — first install (pod not found) is OK to skip;
          # CrashLoopBackOff (pod exists but unhealthy) is a real problem and should fail loud.
          POD_STATE=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/deploy_key "root@$K3S_HOST" \
            "kubectl get pod postgres-0 -n phoenix -o jsonpath='{.status.phase}' 2>/dev/null" || echo "NotFound")

          if [ "$POD_STATE" = "NotFound" ] || [ -z "$POD_STATE" ]; then
            echo "postgres-0 not present — first install on this cluster. Skipping backup."
            echo "BACKED_UP=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$POD_STATE" != "Running" ]; then
            echo "::error::postgres-0 is in state '$POD_STATE' (not Running). Refusing to deploy without a backup."
            exit 1
          fi

          echo "Dumping postgres-0 → $REMOTE_DUMP"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@$K3S_HOST" \
            "kubectl exec -n phoenix postgres-0 -- pg_dump -U phoenixtrader -d phoenixtrader --format=custom --compress=9 > $REMOTE_DUMP && ls -lh $REMOTE_DUMP"

          echo "Copying dump back to runner..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@$K3S_HOST:$REMOTE_DUMP" "$LOCAL_DUMP"
          ls -lh "$LOCAL_DUMP"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@$K3S_HOST" "rm -f $REMOTE_DUMP"
          echo "BACKED_UP=true" >> "$GITHUB_OUTPUT"

      - name: Upload Postgres backup as artifact
        if: steps.backup.outputs.BACKED_UP == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: postgres-pre-${{ steps.tag.outputs.TAG }}
          path: ${{ github.workspace }}/postgres-pre-*.dump
          retention-days: 90
          if-no-files-found: error

      - name: Fail if backup step errored AND postgres exists
        if: steps.backup.outcome == 'failure'
        run: |
          echo "::error::Pre-upgrade Postgres backup failed. Refusing to deploy without a recoverable dump."
          exit 1

      - name: Deploy to k3s
        env:
          K3S_HOST: ${{ secrets.K3S_HOST }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.TAG }}"

          echo "Copying Helm chart to k3s host..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/deploy_key "root@$K3S_HOST" "mkdir -p /opt/phoenix"
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/deploy_key -r helm/phoenix "root@$K3S_HOST:/opt/phoenix/"

          echo "Deploying Phoenix to k3s (tag: $TAG)..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/deploy_key "root@$K3S_HOST" \
            "helm upgrade --install phoenix /opt/phoenix/helm/phoenix \
              -f /opt/phoenix/helm/phoenix/values.prod.yaml \
              -n phoenix --create-namespace \
              --set image.tag=$TAG \
              --wait --timeout=15m"

      - name: Smoke test public health
        if: success()
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            if curl -fsS https://cashflowus.com/health | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('status')=='ready' else 1)"; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Health check failed (attempt $i/6), retrying in 10s..."
            sleep 10
          done
          echo "::error::Public health check failed after 6 attempts. Investigate at https://cashflowus.com/health"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          echo "Deployment complete (tag: ${{ steps.tag.outputs.TAG }})"
