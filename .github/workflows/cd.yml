name: CD

on:
  push:
    tags:
      - "v*"
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all Phoenix services
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          IMAGE_REPO="ghcr.io/thirunagariharish/phoneixclaw"

          SERVICES=(
            "phoenix-api:apps/api/Dockerfile"
            "phoenix-dashboard:apps/dashboard/Dockerfile"
            "phoenix-ws-gateway:services/ws-gateway/Dockerfile"
            "phoenix-llm-gateway:services/llm-gateway/Dockerfile"
            "phoenix-broker-gateway:services/broker-gateway/Dockerfile"
            "phoenix-execution:services/execution/Dockerfile"
            "phoenix-automation:services/automation/Dockerfile"
            "phoenix-discord-ingestion:services/discord-ingestion/Dockerfile"
            "phoenix-feature-pipeline:services/feature-pipeline/Dockerfile"
            "phoenix-inference-service:services/inference-service/Dockerfile"
            "phoenix-agent-orchestrator:services/agent-orchestrator/Dockerfile"
            "phoenix-prediction-monitor:services/prediction-monitor/Dockerfile"
            "phoenix-backtesting:services/backtesting/Dockerfile"
            "phoenix-nginx:infra/Dockerfile.nginx"
          )

          for entry in "${SERVICES[@]}"; do
            IFS=":" read -r svc dockerfile <<< "$entry"
            if [ -f "$dockerfile" ]; then
              echo "Building $svc ($TAG)..."
              docker build -t "$IMAGE_REPO/$svc:$TAG" -t "$IMAGE_REPO/$svc:latest" -f "$dockerfile" .
              docker push "$IMAGE_REPO/$svc:$TAG"
              docker push "$IMAGE_REPO/$svc:latest"
            else
              echo "SKIP: $dockerfile not found"
            fi
          done

      - name: Deploy to k3s
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          K3S_HOST: ${{ secrets.K3S_HOST }}
          K3S_SSH_KEY: ${{ secrets.K3S_SSH_KEY }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"

          if [ -z "${K3S_HOST:-}" ] || [ -z "${K3S_SSH_KEY:-}" ]; then
            echo "ERROR: K3S_HOST and K3S_SSH_KEY secrets are required for k3s deployment"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$K3S_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "Copying Helm chart to k3s host..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@$K3S_HOST" "mkdir -p /opt/phoenix"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -r helm/phoenix "root@$K3S_HOST:/opt/phoenix/"

          echo "Deploying Phoenix to k3s (tag: $TAG)..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@$K3S_HOST" \
            "helm upgrade --install phoenix /opt/phoenix/helm/phoenix \
              -f /opt/phoenix/helm/phoenix/values.prod.yaml \
              -n phoenix --create-namespace \
              --set image.tag=$TAG \
              --wait --timeout=15m"

          rm -f ~/.ssh/deploy_key
          echo "Deployment complete"
