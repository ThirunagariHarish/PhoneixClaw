services:
  seed-postgres:
    image: postgres:16-alpine
    container_name: phoenix-seed-db
    ports:
      # Binds only to localhost — not exposed to the internet.
      # Use SSH tunnel to connect remotely (recommended).
      # To allow direct access from a trusted IP, change to "0.0.0.0:5434:5432"
      # and add a firewall rule: ufw allow from <YOUR_IP> to any port 5434
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: seeduser
      POSTGRES_PASSWORD: ${SEED_DB_PASSWORD:-seedpass}
      POSTGRES_DB: phoenix_seed
    volumes:
      - seed-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seeduser -d phoenix_seed"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  seed-pgdata:
